[package]
name = "kasane-logic"
version = "0.1.4"
edition = "2024"
license = "MIT"
description = "This is Kasane-logic"

[dependencies]
rand = { version = "0.9.2", optional = true }
serde = { version = "1", features = ["derive"], optional = true }
serde_json = { version = "1.0", optional = true }
utoipa = { version = "5.3.1", features = ["macros","axum_extras"], optional = true }

[features]
default = ["random", "serde"]
random = [ "rand" ]
serde = [ "dep:serde", "dep:serde_json" ]
openapi = [ "dep:utoipa", "utoipa/macros" ]
temporal_id = []

[dev-dependencies]
rand = "0.9.2"
proptest = "1.10.0"
rand_chacha = "0.9.0"
memori = "0.1.7"
insta = "1"

[dev-dependencies.cargo-husky]
version = "1"
default-features = false
features = ["precommit-hook","run-cargo-test", "run-cargo-clippy","run-cargo-fmt"]

[[bin]]
name = "kasane-logic"
bench = false

[lib]
bench = false

[[bench]]
name = "triangle"
harness = false

[[bench]]
name = "line"
harness = false

[[bench]]
name = "sphere"
harness = false

[[bench]]
name = "set"
harness = false

