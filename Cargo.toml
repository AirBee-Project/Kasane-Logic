[package]
name = "kasane-logic"
version = "0.1.3"
edition = "2024"
license = "MIT"
description = "This is Kasane-logic"

[dependencies]
rand = { version = "0.9.2", optional = true }
serde = { version = "1", features = ["derive"], optional = true }
utoipa = { version = "5.3.1", features = ["macros","axum_extras"], optional = true }

[features]
random = [ "rand" ]
serde = [ "dep:serde" ]
openapi = [ "dep:utoipa", "utoipa/macros" ]

[dev-dependencies]
cargo-husky = "1.5.0"
rand = "0.9.2"
proptest = "1.10.0"
rand_chacha = "0.9.0"
memori = "0.1.7"


[[bin]]
name = "kasane-logic"
bench = false

[lib]
bench = false

[[bench]]
name = "triangle"
harness = false

[[bench]]
name = "line"
harness = false

[[bench]]
name = "sphere"
harness = false

[[bench]]
name = "set"
harness = false

