name: draft tests

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  fmt_and_doc:
    if: github.event.pull_request.draft == true
    name: cargo fmt & doc
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup mold
        uses: rui314/setup-mold@v1

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "fmt-doc-blacksmith-4vcpu-ubuntu-2404"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Rustdoc (std)
        shell: bash
        run: |
          set -euo pipefail
          features=("std" "std,rayon" "std,random,temporal_id" "std,rayon,random,temporal_id" "std,persist" "std,rayon,random,temporal_id,persist")
          for feature in "${features[@]}"; do
            RUSTDOCFLAGS="-D warnings" cargo doc --locked --no-deps --no-default-features --features "$feature"
          done

      - name: Rustdoc (no_std)
        shell: bash
        run: |
          set -euo pipefail
          features=("" "temporal_id")
          for feature in "${features[@]}"; do
            if [ -n "$feature" ]; then
              RUSTDOCFLAGS="-D warnings" cargo doc --locked --no-deps --no-default-features --features "$feature"
            else
              RUSTDOCFLAGS="-D warnings" cargo doc --locked --no-deps --no-default-features
            fi
          done

  test:
    if: github.event.pull_request.draft == true
    name: cargo test (nextest)
    runs-on: blacksmith-8vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Setup mold
        uses: rui314/setup-mold@v1

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "test-blacksmith-8vcpu-ubuntu-2404"

      - name: Test (std; various features)
        shell: bash
        run: |
          set -euo pipefail
          features=("std" "std,rayon" "std,random,temporal_id" "std,rayon,random,temporal_id" "std,persist" "std,rayon,random,temporal_id,persist")
          for feature in "${features[@]}"; do
            cargo nextest run --locked --no-default-features --features "$feature"
          done

      - name: Test ignored
        shell: bash
        run: |
          set -euo pipefail
          features=("std" "std,rayon,random,temporal_id" "std,rayon,random,temporal_id,persist")
          for feature in "${features[@]}"; do
            cargo nextest run --locked --no-default-features --features "$feature" --run-ignored ignored-only
          done

      - name: Doctest
        shell: bash
        run: |
          set -euo pipefail
          features=("std" "std,rayon,random,temporal_id" "std,rayon,random,temporal_id,persist")
          for feature in "${features[@]}"; do
            cargo test --locked --doc --no-default-features --features "$feature"
          done

      - name: Build (no_std)
        shell: bash
        run: |
          set -euo pipefail
          features=("" "temporal_id")
          for feature in "${features[@]}"; do
            if [ -n "$feature" ]; then
              cargo build --locked --lib --no-default-features --features "$feature"
            else
              cargo build --locked --lib --no-default-features
            fi
          done

  clippy:
    if: github.event.pull_request.draft == true
    name: cargo clippy
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup mold
        uses: rui314/setup-mold@v1

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "clippy-blacksmith-4vcpu-ubuntu-2404"

      - name: Clippy (std)
        shell: bash
        run: |
          set -euo pipefail
          features=("std" "std,rayon" "std,random,temporal_id" "std,rayon,random,temporal_id" "std,persist" "std,rayon,random,temporal_id,persist")
          for feature in "${features[@]}"; do
            cargo clippy --locked --lib --bins --tests --no-default-features --features "$feature" -- -D warnings
          done

      - name: Clippy (no_std)
        shell: bash
        run: |
          set -euo pipefail
          features=("" "temporal_id")
          for feature in "${features[@]}"; do
            if [ -n "$feature" ]; then
              cargo clippy --locked --lib --no-default-features --features "$feature" -- -D warnings
            else
              cargo clippy --locked --lib --no-default-features -- -D warnings
            fi
          done
