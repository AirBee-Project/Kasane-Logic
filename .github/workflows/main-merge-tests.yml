name: main merge tests

on:
  pull_request:
    branches:
      - main

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

  verify:
    name: ${{ matrix.os }} / ${{ matrix.feature_config.name }}
    runs-on: ${{ matrix.os }}
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        feature_config:
          - name: "features: none"
            features: ""
          - name: "features: random"
            features: "random"
          - name: "features: temporal_id"
            features: "temporal_id"
          - name: "features: random,temporal_id"
            features: "random,temporal_id"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "verify-${{ matrix.os }}"

      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.feature_config.features }}" ]; then
            cargo test --locked --lib --bins --tests --no-default-features --features "${{ matrix.feature_config.features }}"
          else
            cargo test --locked --lib --bins --tests --no-default-features
          fi

      - name: Clippy
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.feature_config.features }}" ]; then
            cargo clippy --locked --lib --bins --tests --no-default-features --features "${{ matrix.feature_config.features }}" -- -D warnings
          else
            cargo clippy --locked --lib --bins --tests --no-default-features -- -D warnings
          fi