name: main merge tests

on:
  pull_request:
    branches:
      - main

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup mold
        uses: rui314/setup-mold@v1

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

  verify:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup mold
        if: matrix.os == 'ubuntu-latest'
        uses: rui314/setup-mold@v1

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "verify-${{ matrix.os }}"

      # テストハーネスは std を要求するため、テスト系は std を付けて実行する。
      # rayon の有無（並列／逐次）を両方検証する。
      - name: Test (std; rayon on/off)
        shell: bash
        run: |
          set -euo pipefail
          features=("std" "std,rayon" "std,random,temporal_id" "std,rayon,random,temporal_id")
          for feature in "${features[@]}"; do
            cargo test --locked --lib --bins --tests --no-default-features --features "$feature"
          done

      - name: Test ignored
        shell: bash
        run: |
          set -euo pipefail
          features=("std" "std,rayon,random,temporal_id")
          for feature in "${features[@]}"; do
            cargo test --locked --lib --bins --tests --no-default-features --features "$feature" -- --ignored
          done

      - name: Doctest
        shell: bash
        run: |
          set -euo pipefail
          features=("std" "std,rayon,random,temporal_id")
          for feature in "${features[@]}"; do
            cargo test --locked --doc --no-default-features --features "$feature"
          done

      - name: Clippy (std)
        shell: bash
        run: |
          set -euo pipefail
          features=("std" "std,rayon" "std,random,temporal_id" "std,rayon,random,temporal_id")
          for feature in "${features[@]}"; do
            cargo clippy --locked --lib --bins --tests --no-default-features --features "$feature" -- -D warnings
          done

      # no_std はテストハーネスが使えないため、ビルドと clippy（lib のみ）で検証する。
      - name: Build & Clippy (no_std)
        shell: bash
        run: |
          set -euo pipefail
          features=("" "temporal_id")
          for feature in "${features[@]}"; do
            if [ -n "$feature" ]; then
              cargo build --locked --lib --no-default-features --features "$feature"
              cargo clippy --locked --lib --no-default-features --features "$feature" -- -D warnings
            else
              cargo build --locked --lib --no-default-features
              cargo clippy --locked --lib --no-default-features -- -D warnings
            fi
          done