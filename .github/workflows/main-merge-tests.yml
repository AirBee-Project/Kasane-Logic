name: main merge tests

on:
  pull_request:
    branches:
      - main

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup mold
        uses: rui314/setup-mold@v1

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

  verify:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup mold
        if: matrix.os == 'ubuntu-latest'
        uses: rui314/setup-mold@v1

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "verify-${{ matrix.os }}"

      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          features=("" "random" "temporal_id" "random,temporal_id")
          for feature in "${features[@]}"; do
            if [ -n "$feature" ]; then
              cargo test --locked --lib --bins --tests --no-default-features --features "$feature"
            else
              cargo test --locked --lib --bins --tests --no-default-features
            fi
          done

      - name: Test ignored
        shell: bash
        run: |
          set -euo pipefail
          features=("" "random" "temporal_id" "random,temporal_id")
          for feature in "${features[@]}"; do
            if [ -n "$feature" ]; then
              cargo test --locked --lib --bins --tests --no-default-features --features "$feature" -- --ignored
            else
              cargo test --locked --lib --bins --tests --no-default-features -- --ignored
            fi
          done

      - name: Doctest
        shell: bash
        run: |
          set -euo pipefail
          features=("" "random" "temporal_id" "random,temporal_id")
          for feature in "${features[@]}"; do
            if [ -n "$feature" ]; then
              cargo test --locked --doc --no-default-features --features "$feature"
            else
              cargo test --locked --doc --no-default-features
            fi
          done

      - name: Clippy
        shell: bash
        run: |
          set -euo pipefail
          features=("" "random" "temporal_id" "random,temporal_id")
          for feature in "${features[@]}"; do
            if [ -n "$feature" ]; then
              cargo clippy --locked --lib --bins --tests --no-default-features --features "$feature" -- -D warnings
            else
              cargo clippy --locked --lib --bins --tests --no-default-features -- -D warnings
            fi
          done