name: main merge tests

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set matrix for OS
        id: set-matrix
        run: |
          if [ "${{ github.event.pull_request.draft }}" == "true" ]; then
            echo 'matrix=["blacksmith-4vcpu-ubuntu-2404"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["blacksmith-4vcpu-ubuntu-2404", "blacksmith-6vcpu-macos-latest", "blacksmith-4vcpu-windows-2025"]' >> $GITHUB_OUTPUT
          fi

  fmt:
    name: cargo fmt
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup mold
        uses: rui314/setup-mold@v1

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

  verify:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: [setup-matrix, fmt]
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup mold
        if: matrix.os == 'ubuntu-latest'
        uses: rui314/setup-mold@v1

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "verify-${{ matrix.os }}"

      - name: Test (std; various features)
        shell: bash
        run: |
          set -euo pipefail
          features=("std" "std,rayon" "std,random,temporal_id" "std,rayon,random,temporal_id" "std,persist" "std,rayon,random,temporal_id,persist")
          for feature in "${features[@]}"; do
            cargo test --locked --lib --bins --tests --no-default-features --features "$feature"
          done

      - name: Test ignored
        shell: bash
        run: |
          set -euo pipefail
          features=("std" "std,rayon,random,temporal_id" "std,rayon,random,temporal_id,persist")
          for feature in "${features[@]}"; do
            cargo test --locked --lib --bins --tests --no-default-features --features "$feature" -- --ignored
          done

      - name: Doctest
        shell: bash
        run: |
          set -euo pipefail
          features=("std" "std,rayon,random,temporal_id" "std,rayon,random,temporal_id,persist")
          for feature in "${features[@]}"; do
            cargo test --locked --doc --no-default-features --features "$feature"
          done

      - name: Clippy (std)
        shell: bash
        run: |
          set -euo pipefail
          features=("std" "std,rayon" "std,random,temporal_id" "std,rayon,random,temporal_id" "std,persist" "std,rayon,random,temporal_id,persist")
          for feature in "${features[@]}"; do
            cargo clippy --locked --lib --bins --tests --no-default-features --features "$feature" -- -D warnings
          done

      - name: Build & Clippy (no_std)
        shell: bash
        run: |
          set -euo pipefail
          features=("" "temporal_id")
          for feature in "${features[@]}"; do
            if [ -n "$feature" ]; then
              cargo build --locked --lib --no-default-features --features "$feature"
              cargo clippy --locked --lib --no-default-features --features "$feature" -- -D warnings
            else
              cargo build --locked --lib --no-default-features
              cargo clippy --locked --lib --no-default-features -- -D warnings
            fi
          done

      - name: Rustdoc (std)
        shell: bash
        run: |
          set -euo pipefail
          features=("std" "std,rayon" "std,random,temporal_id" "std,rayon,random,temporal_id" "std,persist" "std,rayon,random,temporal_id,persist")
          for feature in "${features[@]}"; do
            RUSTDOCFLAGS="-D warnings" cargo doc --locked --no-deps --no-default-features --features "$feature"
          done

      - name: Rustdoc (no_std)
        shell: bash
        run: |
          set -euo pipefail
          features=("" "temporal_id")
          for feature in "${features[@]}"; do
            if [ -n "$feature" ]; then
              RUSTDOCFLAGS="-D warnings" cargo doc --locked --no-deps --no-default-features --features "$feature"
            else
              RUSTDOCFLAGS="-D warnings" cargo doc --locked --no-deps --no-default-features
            fi
          done
