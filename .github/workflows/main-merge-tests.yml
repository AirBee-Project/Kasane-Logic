name: main merge tests

on:
  pull_request:
    branches:
      - main

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup mold
        uses: rui314/setup-mold@v1

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

  check:
    name: check (${{ matrix.os }}, ${{ matrix.features }})
    runs-on: ${{ matrix.os }}
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        features:
          - "std"
          - "std,rayon"
          - "std,random,temporal_id"
          - "std,rayon,random,temporal_id"
          - "std,persist"
          - "std,rayon,random,temporal_id,persist"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install cargo-hack
        uses: taiki-e/install-action@cargo-hack

      - name: Setup mold (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: rui314/setup-mold@v1

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "check-${{ matrix.os }}-${{ matrix.features }}"

      - name: Clippy
        shell: bash
        run: |
          set -euo pipefail
          cargo hack clippy --locked --lib --bins --tests --no-default-features --features "${{ matrix.features }}" -- -D warnings

      - name: Rustdoc
        shell: bash
        run: |
          set -euo pipefail
          RUSTDOCFLAGS="-D warnings" cargo hack doc --locked --no-deps --no-default-features --features "${{ matrix.features }}"

      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          cargo hack test --locked --lib --bins --tests --no-default-features --features "${{ matrix.features }}"

      - name: Test ignored
        if: matrix.features == 'std' || matrix.features == 'std,rayon,random,temporal_id' || matrix.features == 'std,rayon,random,temporal_id,persist'
        shell: bash
        run: |
          set -euo pipefail
          cargo hack test --locked --lib --bins --tests --no-default-features --features "${{ matrix.features }}" -- --ignored

      - name: Doctest
        if: matrix.features == 'std' || matrix.features == 'std,rayon,random,temporal_id' || matrix.features == 'std,rayon,random,temporal_id,persist'
        shell: bash
        run: |
          set -euo pipefail
          cargo hack test --locked --doc --no-default-features --features "${{ matrix.features }}"

  verify-no-std:
    name: verify no_std (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install cargo-hack
        uses: taiki-e/install-action@cargo-hack

      - name: Setup mold (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: rui314/setup-mold@v1

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "verify-no-std-${{ matrix.os }}"

      - name: Build & Clippy (no_std)
        shell: bash
        run: |
          set -euo pipefail
          cargo hack build --locked --lib --no-default-features
          cargo hack clippy --locked --lib --no-default-features -- -D warnings
          
          cargo hack build --locked --lib --no-default-features --features "temporal_id"
          cargo hack clippy --locked --lib --no-default-features --features "temporal_id" -- -D warnings

      - name: Rustdoc (no_std)
        shell: bash
        run: |
          set -euo pipefail
          RUSTDOCFLAGS="-D warnings" cargo hack doc --locked --no-deps --no-default-features
          RUSTDOCFLAGS="-D warnings" cargo hack doc --locked --no-deps --no-default-features --features "temporal_id"
