name: main merge tests

on:
  pull_request:
    branches:
      - main

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup mold
        uses: rui314/setup-mold@v1

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-hack
        uses: taiki-e/install-action@cargo-hack

      - name: Setup mold (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: rui314/setup-mold@v1

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "test-${{ matrix.os }}"

      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          cargo hack test --locked --lib --bins --tests --no-default-features --features "std"
          cargo hack test --locked --lib --bins --tests --no-default-features --features "std,rayon"
          cargo hack test --locked --lib --bins --tests --no-default-features --features "std,random,temporal_id"
          cargo hack test --locked --lib --bins --tests --no-default-features --features "std,rayon,random,temporal_id"
          cargo hack test --locked --lib --bins --tests --no-default-features --features "std,persist"
          cargo hack test --locked --lib --bins --tests --no-default-features --features "std,rayon,random,temporal_id,persist"

      - name: Test ignored
        shell: bash
        run: |
          set -euo pipefail
          cargo hack test --locked --lib --bins --tests --no-default-features --features "std" -- --ignored
          cargo hack test --locked --lib --bins --tests --no-default-features --features "std,rayon,random,temporal_id" -- --ignored
          cargo hack test --locked --lib --bins --tests --no-default-features --features "std,rayon,random,temporal_id,persist" -- --ignored

      - name: Doctest
        shell: bash
        run: |
          set -euo pipefail
          cargo hack test --locked --doc --no-default-features --features "std"
          cargo hack test --locked --doc --no-default-features --features "std,rayon,random,temporal_id"
          cargo hack test --locked --doc --no-default-features --features "std,rayon,random,temporal_id,persist"

  clippy-doc:
    name: clippy & doc (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install cargo-hack
        uses: taiki-e/install-action@cargo-hack

      - name: Setup mold (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: rui314/setup-mold@v1

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "clippy-doc-${{ matrix.os }}"

      - name: Clippy
        shell: bash
        run: |
          set -euo pipefail
          cargo hack clippy --locked --lib --bins --tests --no-default-features --features "std" -- -D warnings
          cargo hack clippy --locked --lib --bins --tests --no-default-features --features "std,rayon" -- -D warnings
          cargo hack clippy --locked --lib --bins --tests --no-default-features --features "std,random,temporal_id" -- -D warnings
          cargo hack clippy --locked --lib --bins --tests --no-default-features --features "std,rayon,random,temporal_id" -- -D warnings
          cargo hack clippy --locked --lib --bins --tests --no-default-features --features "std,persist" -- -D warnings
          cargo hack clippy --locked --lib --bins --tests --no-default-features --features "std,rayon,random,temporal_id,persist" -- -D warnings

      - name: Rustdoc
        shell: bash
        run: |
          set -euo pipefail
          RUSTDOCFLAGS="-D warnings" cargo hack doc --locked --no-deps --no-default-features --features "std"
          RUSTDOCFLAGS="-D warnings" cargo hack doc --locked --no-deps --no-default-features --features "std,rayon"
          RUSTDOCFLAGS="-D warnings" cargo hack doc --locked --no-deps --no-default-features --features "std,random,temporal_id"
          RUSTDOCFLAGS="-D warnings" cargo hack doc --locked --no-deps --no-default-features --features "std,rayon,random,temporal_id"
          RUSTDOCFLAGS="-D warnings" cargo hack doc --locked --no-deps --no-default-features --features "std,persist"
          RUSTDOCFLAGS="-D warnings" cargo hack doc --locked --no-deps --no-default-features --features "std,rayon,random,temporal_id,persist"

  verify-no-std:
    name: verify no_std (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install cargo-hack
        uses: taiki-e/install-action@cargo-hack

      - name: Setup mold (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: rui314/setup-mold@v1

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "verify-no-std-${{ matrix.os }}"

      - name: Build & Clippy (no_std)
        shell: bash
        run: |
          set -euo pipefail
          cargo hack build --locked --lib --no-default-features
          cargo hack clippy --locked --lib --no-default-features -- -D warnings
          
          cargo hack build --locked --lib --no-default-features --features "temporal_id"
          cargo hack clippy --locked --lib --no-default-features --features "temporal_id" -- -D warnings

      - name: Rustdoc (no_std)
        shell: bash
        run: |
          set -euo pipefail
          RUSTDOCFLAGS="-D warnings" cargo hack doc --locked --no-deps --no-default-features
          RUSTDOCFLAGS="-D warnings" cargo hack doc --locked --no-deps --no-default-features --features "temporal_id"
