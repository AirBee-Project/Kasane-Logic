name: Benchmark

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-benchmarks:
    name: Build Benchmarks
    runs-on: ubuntu-latest
    outputs:
      benches: ${{ steps.benches.outputs.benches }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup mold
        uses: rui314/setup-mold@v1

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Get benchmark list
        id: benches
        run: |
          BENCH_LIST=$(cargo metadata --format-version 1 --no-deps | jq -c '[.packages[] | select(.name=="kasane-logic") | .targets[] | select(.kind[] == "bench") | .name | select(. != "spatial_id_set_memory")]')
          echo "benches=$BENCH_LIST" >> $GITHUB_OUTPUT

      - name: Build benchmarks
        run: |
          mkdir -p bench-binaries
          BENCHES=$(echo '${{ steps.benches.outputs.benches }}' | jq -r '.[]')
          for bench in $BENCHES; do
            EXEC=$(cargo bench --bench $bench --no-run --message-format=json | jq -r 'select(.profile.test == true and .executable != null) | .executable')
            cp "$EXEC" "bench-binaries/$bench"
          done

      - name: Upload benchmark binaries
        uses: actions/upload-artifact@v4
        with:
          name: bench-binaries
          path: bench-binaries/

  run-benchmarks:
    name: Run Benchmark (${{ matrix.bench_name }})
    needs: build-benchmarks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bench_name: ${{ fromJson(needs.build-benchmarks.outputs.benches) }}
    steps:
      - name: Download benchmark binaries
        uses: actions/download-artifact@v4
        with:
          name: bench-binaries
          path: bench-binaries

      - name: Run benchmark
        run: |
          chmod +x bench-binaries/${{ matrix.bench_name }}
          bench-binaries/${{ matrix.bench_name }} --bench --output-format bencher | tee ${{ matrix.bench_name }}.txt

      - name: Upload benchmark result txt
        uses: actions/upload-artifact@v4
        with:
          name: bench-result-${{ matrix.bench_name }}
          path: ${{ matrix.bench_name }}.txt

      - name: Upload Criterion HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: criterion-report-${{ matrix.bench_name }}
          path: target/criterion/report

  publish-benchmarks:
    name: Publish Benchmarks
    needs: run-benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all benchmark results
        uses: actions/download-artifact@v4
        with:
          pattern: bench-result-*
          path: bench-results
          merge-multiple: true

      - name: Merge benchmark results
        run: cat bench-results/*.txt > all_bench_output.txt

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Kasane-Logic Benchmarks
          tool: "cargo"
          output-file-path: all_bench_output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: "200%"
          comment-on-alert: true
          fail-on-alert: false
          gh-pages-branch: "gh-pages"

      - name: Download all Criterion reports
        uses: actions/download-artifact@v4
        with:
          pattern: criterion-report-*
          path: criterion-reports

      - name: Generate Index for Criterion Reports
        run: |
          echo "<!DOCTYPE html><html><head><title>Criterion Reports</title><meta charset='utf-8'><style>body{font-family:sans-serif;margin:40px;background:#f9f9f9;}h1{color:#333;}ul{list-style-type:none;padding:0;}li{margin:10px 0;}a{text-decoration:none;color:#0366d6;font-size:18px;}a:hover{text-decoration:underline;}</style></head><body><h1>Criterion HTML Reports</h1><ul>" > criterion-reports/index.html
          for d in criterion-reports/criterion-report-*/ ; do
            if [ -d "$d" ]; then
              folder_name=$(basename "$d")
              bench_name=${folder_name#criterion-report-}
              echo "<li><a href=\"$folder_name/index.html\">📊 $bench_name</a></li>" >> criterion-reports/index.html
            fi
          done
          echo "</ul><br><a href=\"../dev/bench/\">⬅️ Back to Historical Dashboard</a></body></html>" >> criterion-reports/index.html

      - name: Deploy Criterion Reports to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./criterion-reports
          destination_dir: criterion-reports
          keep_files: true

  memory-benchmark:
    name: Memory Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Run memory benchmark
        run: cargo bench --bench spatial_id_set_memory >> $GITHUB_STEP_SUMMARY
