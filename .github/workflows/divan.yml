name: Divan Memory & Performance Scaling

on:
  push:
    branches: [main]

permissions:
  contents: write
  deployments: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Run Divan Benchmark
        run: |
          cargo bench --bench triangle_memory > result.json

      - name: Store and Graph Results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: "divan"
          output-file-path: divan_result.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          benchmark-data-dir-path: "dev/bench/divan"
          comment-on-alert: true
          fail-on-alert: false
          auto-push: true
